<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}
    <!-- <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }} - {{ site.description }}"
      href="{{ site.baseurl }}/feed.xml"
    />-->
    <link rel="shortcut icon" type="image/x-icon" href="{{ "/favicon.ico" | prepend: site.baseurl }}" >

    <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter" />

    <script type="text/javascript" src="/lyrics/setlist_2026.js"></script>

    <script>
      const sortedSetlist = setlist.sort((a, b) => {
        if (a.index < b.index) return -1;
        if (a.index > b.index) return 1;
        return 0;
      });

      const formatLinkDestination = (item) => {
        return `/lyrics/${item.band.toLowerCase().replaceAll(" ", "_")}_${item.song
          .toLowerCase()
          .replaceAll(" ", "_")
          .replaceAll(",", "")}`;
      };

      const linkTemplate = (item) => {
        const link = document.createElement("a");
        link.href = formatLinkDestination(item);
        link.textContent = `${item.band} - ${item.song}`;

        const wrapper = document.createElement("p");
        wrapper.appendChild(link);

        return wrapper;
      };

      $(function () {
        sortedSetlist.map((item) => {
          document.querySelector("#SetList").append(linkTemplate(item));
        });
      });
    </script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-y: scroll;
        background: #1f1f1f;
        color: #fff;
        font-size: 1.1rem;
      }
      #SetList {
        text-align: center;
        white-space: pre;
        font-family: "Inter", sans-serif;
      }
      #SetList a {
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div id="SetList"></div>
  </body>
</html>

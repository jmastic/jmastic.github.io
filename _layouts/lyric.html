<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    <!-- {% include meta.html %} -->
    <!-- <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }} - {{ site.description }}"
      href="{{ site.baseurl }}/feed.xml"
    /> -->
    <link rel="shortcut icon" type="image/x-icon" href="{{ "/favicon.ico" | prepend: site.baseurl }}" >

    <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
    <script type="text/javascript" src="/jquery.textfill.min.js"></script>
    <script type="text/javascript" src="/lyrics/setlist_2026.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1f1f1f;
        color: #fff;
      }
      #TextInput {
        resize: none;
        outline: none;
        width: 100%;
        border: none;
        height: 100%;
        position: absolute;
        background: transparent;
        z-index: 2;
        padding: 0;
        margin: 0;
        color: #fff;
      }
      .lyrics-container {
        display: flex;
        width: 100%;
        height: 100%;
        flex-wrap: nowrap;
      }
      .textbox {
        width: 100%;
        height: 99vh;
        margin: 0;
        padding: 0.5vw;
        white-space: pre;
        font-family: "Inter", sans-serif;
        flex-grow: 0;
        flex-shrink: 1;
        flex-basis: auto;
        overflow-y: scroll;
        overflow-x: clip;
        -ms-overflow-style: none; /* Internet Explorer 10+ */
        scrollbar-width: none; /* Firefox, Safari 18.2+, Chromium 121+ */
      }
      .textbox::-webkit-scrollbar {
        display: none; /* Older Safari and Chromium */
      }
      nav {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 2rem;
      }
      nav a {
        /* background: #000; */
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        display: flex;
        border-radius: 10px;
        margin-bottom: 10px;
        text-decoration: none;
      }
    </style>

    <script>
      const getContent = () => {
        const text = stripHTML(document.querySelector("#TextContent").textContent);
        return text;
      };

      $(function () {
        refit(getContent());
        window.onresize = () => {
          refit(getContent());
        };
      });

      const resetColumns = () => {
        $(".lyrics-container").html(`<div class="textbox"><span></span></div>`);
      };

      const addColumn = () => {
        $(".lyrics-container").append(`<div class="textbox"><span></span></div>`);
      };

      const splitText = (text, times) => {
        let separateLines = text.split(/\r?\n|\r|\n/g);
        const size = Math.ceil(separateLines.length / times);
        return Array.from({ length: times }, (v, i) => separateLines.slice(i * size, i * size + size));
      };

      const setText = (text, index) => {
        $(`.textbox:nth-child(${index + 1}) span`).html(text);
      };

      const fitText = (index) => {
        $(`.textbox`).textfill({
          maxFontPixels: -1,
          changeLineHeight: true,
        });
      };

      const setOneColumn = (text) => {
        resetColumns();
        setText(text, 0);
        fitText(0);
        // All right, so we've pasted it and it's sized to a single column.
        // Let's get the font size and see if we can make it larger.
        return parseInt($(".textbox span").css("fontSize"));
      };

      const setTwoColumns = (text) => {
        resetColumns();
        addColumn();
        let cols = splitText(text, 2);
        setText(cols[0].map((row) => row.trim()).join("\n"), 0);
        setText(cols[1].map((row) => row.trim()).join("\n"), 1);
        $(".textbox").css("width", "calc(100%/2)");
        fitText(0);
        return Math.min(
          parseInt($(".textbox:nth-child(1) span").css("fontSize")),
          parseInt($(".textbox:nth-child(2) span").css("fontSize"))
        );
      };

      const setThreeColumns = (text) => {
        resetColumns();
        addColumn();
        addColumn();
        cols = splitText(text, 3);
        setText(cols[0].map((row) => row.trim()).join("\n"), 0);
        setText(cols[1].map((row) => row.trim()).join("\n"), 1);
        setText(cols[2].map((row) => row.trim()).join("\n"), 2);
        $(".textbox").css("width", "calc(100%/3)");
        fitText(0);
        return Math.min(
          parseInt($(".textbox:nth-child(1) span").css("fontSize")),
          parseInt($(".textbox:nth-child(2) span").css("fontSize")),
          parseInt($(".textbox:nth-child(3) span").css("fontSize"))
        );
      };

      const refit = (text) => {
        // fullText = text;
        if (!text) {
          text = getContent();
        }
        const oneColFontSize = setOneColumn(text) - 2;
        // Now, let's try 2 columns
        const twoColFontSize = setTwoColumns(text);
        // Now, let's try 3 columns
        const threeColFontSize = setThreeColumns(text);

        // If 1 column has bigger text, use it
        if (oneColFontSize > twoColFontSize && oneColFontSize > threeColFontSize) {
          resetColumns();
          setOneColumn(text);
          $(".textbox span").css("fontSize", parseInt($(".textbox span").css("font-size")) - 2 + "px");
        }
        // 2 is going to be our "preferred" sizing
        if (twoColFontSize >= oneColFontSize && twoColFontSize >= threeColFontSize) {
          resetColumns();
          setTwoColumns(text);
        }
        if (threeColFontSize > oneColFontSize && threeColFontSize > twoColFontSize) {
          resetColumns();
          setThreeColumns(text);
        }
      };

      const stripHTML = (text) => {
        var regex = /(<([^>]+)>)/gi;
        return text.replace(regex, "");
      };

      const currentIndex = parseInt("{{page.index}}");
      const navNext = currentIndex + 1;
      const navPrevious = currentIndex - 1;
    </script>

    <script>
      const sortedSetlist = setlist.sort((a, b) => {
        if (a.index < b.index) return -1;
        if (a.index > b.index) return 1;
        return 0;
      });

      const formatLinkDestination = (item) => {
        if (!item) {
          return "#";
        }
        return `/lyrics/${item.band.toLowerCase().replaceAll(" ", "_")}_${item.song
          .toLowerCase()
          .replaceAll(" ", "_")
          .replaceAll(",", "")}`;
      };

      $(function () {
        // Set Previous
        document.querySelector("nav .prev").setAttribute(
          "href",
          formatLinkDestination(
            sortedSetlist.find((item) => {
              return item.index === currentIndex - 1;
            })
          )
        );

        // Set Next
        document.querySelector("nav .next").setAttribute(
          "href",
          formatLinkDestination(
            sortedSetlist.find((item) => {
              return item.index === currentIndex + 1;
            })
          )
        );
      });
    </script>
  </head>

  <body>
    <!-- <textarea type="textarea" id="TextInput" spellcheck="false"> </textarea> -->
    <div id="TextContent" style="display: none">{{ content }}</div>
    <div class="lyrics-container">
      <div class="textbox"><span>{{ content }}</span></div>
    </div>

    <nav>
      <a class="prev" href="#">⏮️</a>
      <a class="next" href="#">⏭️</a>
      <a class="menu" href="/lyrics/">🔼</a>
    </nav>
  </body>
</html>
